<!DOCTYPE html>
<html>
<head>
  <title>Dashboard Absensi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 10px;
      background: #f5f5f5;
    }
    h2 {
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }
    th, td {
      padding: 8px;
      border: 1px solid #ddd;
      font-size: 12px;
    }
    th {
      background: #007bff;
      color: white;
    }
    button {
      padding: 8px;
      margin: 5px 0;
    }
  </style>
</head>
<body>

<h2>Dashboard Absensi</h2>

Filter Tanggal:
<input type="date" id="tgl">
<button onclick="loadData()">Load</button>
<button onclick="exportCSV()">Export CSV</button>

<br><br>

<table id="tbl">
  <thead>
    <tr>
      <th>Tanggal</th>
      <th>NIK</th>
      <th>Nama</th>
      <th>Status</th>
      <th>Jarak</th>
      <th>Keterangan</th>
      <th>Foto</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
let dataGlobal = [];

function loadData() {
  fetch(https://script.google.com/macros/s/AKfycbxZuJSX46ZR5xGl6PkKyVesxlzGxhbwsGbiclXJrY0YavnfTJ53XHX8uCGkDoXhw5g/exec)
    .then(res => res.json())
    .then(data => {

      dataGlobal = data;

      let tglFilter = document.getElementById("tgl").value;
      let tbody = document.querySelector("#tbl tbody");

      tbody.innerHTML = "";

      data.forEach(d => {

        let tgl = new Date(d.tanggal).toISOString().split('T')[0];

        if (tglFilter && tgl !== tglFilter) return;

        let row = `
          <tr>
            <td>${tgl}</td>
            <td>${d.nik}</td>
            <td>${d.nama}</td>
            <td>${d.status}</td>
            <td>${Math.round(d.jarak)} m</td>
            <td>${d.ket}</td>
            <td><a href="${d.foto}" target="_blank">Lihat</a></td>
          </tr>
        `;

        tbody.innerHTML += row;
      });

    });
}

// EXPORT CSV
function exportCSV() {
  let csv = "Tanggal,NIK,Nama,Status,Jarak,Keterangan\n";

  dataGlobal.forEach(d => {
    let tgl = new Date(d.tanggal).toISOString().split('T')[0];
    csv += `${tgl},${d.nik},${d.nama},${d.status},${d.jarak},${d.ket}\n`;
  });

  let blob = new Blob([csv], { type: 'text/csv' });
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "absensi.csv";
  a.click();
}
</script>

</body>
</html>
