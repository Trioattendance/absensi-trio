<!DOCTYPE html>
<html>
<head>
  <title>Absensi Karyawan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      max-width: 400px;
      margin: auto;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
    }
    .btn-masuk {
      background: #28a745;
      color: white;
      border: none;
    }
    .btn-pulang {
      background: #dc3545;
      color: white;
      border: none;
    }
    video, canvas {
      width: 100%;
      margin-top: 10px;
    }
    #msg {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

<h2>Absensi Karyawan</h2>

<input type="text" id="nik" placeholder="NIK">
<input type="password" id="pin" placeholder="PIN">

<video id="video" autoplay></video>
<button onclick="ambilFoto()">Ambil Foto</button>
<canvas id="canvas" style="display:none;"></canvas>

<button class="btn-masuk" onclick="kirim('Masuk')">Masuk</button>
<button class="btn-pulang" onclick="kirim('Pulang')">Pulang</button>

<div id="msg"></div>

<script>
let fotoBase64 = "";

// AKSES KAMERA
navigator.mediaDevices.getUserMedia({
  video: {
    facingMode: "user" // kamera depan
  }
})
.then(stream => {
  document.getElementById("video").srcObject = stream;
})
.catch(err => {
  alert("Tidak bisa akses kamera: " + err);
});

// AMBIL FOTO
function ambilFoto() {
  let canvas = document.getElementById("canvas");
  let video = document.getElementById("video");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video, 0, 0);
  fotoBase64 = canvas.toDataURL("image/jpeg");

  alert("Foto berhasil diambil");
}

// KIRIM DATA
function kirim(status) {
  let nik = document.getElementById("nik").value;
  let pin = document.getElementById("pin").value;

  if (!nik || !pin || !fotoBase64) {
    alert("Lengkapi data & foto dulu!");
    return;
  }

  navigator.geolocation.getCurrentPosition(pos => {

    fetch("https://script.google.com/macros/s/AKfycbxZuJSX46ZR5xGl6PkKyVesxlzGxhbwsGbiclXJrY0YavnfTJ53XHX8uCGkDoXhw5g/exec?action=getAbsensi", {
      method: "POST",
      body: JSON.stringify({
        nik: nik,
        pin: pin,
        status: status,
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        foto: fotoBase64
      })
    })
    .then(res => res.json())
    .then(res => {
      document.getElementById("msg").innerText = res.message;
    });

  }, () => {
    alert("GPS gagal diambil");
  });
}
</script>

</body>
</html>
