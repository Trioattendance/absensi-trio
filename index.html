<!DOCTYPE html>
<html>
<head>
  <title>Absensi Karyawan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      background: #f5f5f5;
    }

    h2 {
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      border: none;
      font-weight: bold;
    }

    .btn-masuk {
      background: #28a745;
      color: white;
    }

    .btn-pulang {
      background: #dc3545;
      color: white;
    }

    #cameraBox {
      position: relative;
    }

    video, img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    #loadingCam {
      text-align: center;
      margin-top: 5px;
      color: #666;
    }

    #msg {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>

<body>

<h2>Absensi Karyawan</h2>

<input type="text" id="nik" placeholder="NIK">
<input type="password" id="pin" placeholder="PIN">

<div id="cameraBox">
  <video id="video" autoplay playsinline></video>
  <img id="preview" style="display:none;">
</div>

<div id="loadingCam">⏳ Menyalakan kamera...</div>

<button id="btnFoto" onclick="toggleFoto()">📸 Ambil Foto</button>

<button class="btn-masuk" onclick="kirim('Masuk')">✅ Masuk</button>
<button class="btn-pulang" onclick="kirim('Pulang')">🏠 Pulang</button>

<div id="msg"></div>

<!-- AUDIO -->
<audio id="successSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="errorSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<script>
let fotoBase64 = "";
let streamCamera;
let audioReady = false;
let sudahFoto = false;

// trigger audio HP
document.body.addEventListener("click", () => {
  audioReady = true;
}, { once: true });

// START CAMERA
async function startCamera() {
  try {
    const loading = document.getElementById("loadingCam");

    streamCamera = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user" },
      audio: false
    });

    const video = document.getElementById("video");
    video.srcObject = streamCamera;

    video.onloadedmetadata = () => {
      video.play();
      loading.style.display = "none";
    };

  } catch (err) {
    alert("Kamera tidak bisa diakses: " + err.message);
  }
}

document.addEventListener("DOMContentLoaded", startCamera);

// TOGGLE FOTO
function toggleFoto() {
  let video = document.getElementById("video");
  let preview = document.getElementById("preview");
  let btn = document.getElementById("btnFoto");

  if (!sudahFoto) {
    if (!video.videoWidth) {
      alert("Kamera masih loading...");
      return;
    }

    let canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    let ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    fotoBase64 = canvas.toDataURL("image/jpeg");

    preview.src = fotoBase64;
    preview.style.display = "block";
    video.style.display = "none";

    btn.innerText = "🔄 Ulang Foto";
    sudahFoto = true;

  } else {
    preview.style.display = "none";
    video.style.display = "block";

    btn.innerText = "📸 Ambil Foto";
    fotoBase64 = "";
    sudahFoto = false;
  }
}

// KIRIM DATA
function kirim(status) {
  let nik = document.getElementById("nik").value;
  let pin = document.getElementById("pin").value;

  if (!nik || !pin || !fotoBase64) {
    alert("Lengkapi data & foto dulu!");
    return;
  }

  let buttons = document.querySelectorAll("button");
  buttons.forEach(btn => btn.disabled = true);

  navigator.geolocation.getCurrentPosition(pos => {

    fetch("https://script.google.com/macros/s/AKfycbxZuJSX46ZR5xGl6PkKyVesxlzGxhbwsGbiclXJrY0YavnfTJ53XHX8uCGkDoXhw5g/exec", {
      method: "POST",
      body: JSON.stringify({
        nik: nik,
        pin: pin,
        status: status,
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        foto: fotoBase64
      })
    })
    .then(res => res.json())
    .then(res => {

      document.getElementById("msg").innerText = res.message;

      if (res.status === "success") {
        if (audioReady) document.getElementById("successSound").play();

        document.getElementById("nik").value = "";
        document.getElementById("pin").value = "";

        // reset foto
        document.getElementById("preview").style.display = "none";
        document.getElementById("video").style.display = "block";
        document.getElementById("btnFoto").innerText = "📸 Ambil Foto";

        fotoBase64 = "";
        sudahFoto = false;

      } else {
        if (audioReady) document.getElementById("errorSound").play();
      }

      buttons.forEach(btn => btn.disabled = false);

    });

  }, () => {
    alert("GPS gagal diambil");
    buttons.forEach(btn => btn.disabled = false);
  });
}
</script>

</body>
</html>
